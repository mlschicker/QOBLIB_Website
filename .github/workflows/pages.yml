name: Build GitHub Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Build site
        env:
          SITE_REPO_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.html_url || format('{0}/{1}', github.server_url, github.repository) }}
          SITE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python misc/build_site.py --out _site --repo-url "$SITE_REPO_URL" --ref "$SITE_REF"

      - name: Upload PR preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: qoblib-site
          path: _site
          if-no-files-found: error
          retention-days: 14

      - name: Configure Pages
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy Pages
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
